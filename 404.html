  body { margin: 0; background: #f7f1e6; }

  .nf-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 80px 32px 100px;
    text-align: center;
  }

  .nf-photo {
    width: 128px;
    height: 128px;
    margin: 0 auto 28px;
    border-radius: 50%;
    overflow: hidden;
    border: 1.5px solid var(--ink);
    background: #efe7d6;
  }
  .nf-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .nf-tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .nf-head {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 0 0 18px;
    text-wrap: balance;
  }

  .nf-body {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 16px;
    line-height: 1.55;
    color: var(--sub);
    margin: 0 auto;
    max-width: 44ch;
  }

  .nf-back {
    margin-top: 36px;
  }
  .nf-back a {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;

    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
  }
  .nf-back a:hover { color: var(--accent); }

  @media (max-width: 600px) {
    .nf-wrap { padding: 56px 24px 60px; }
    .nf-head { font-size: 30px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="site-nav.js"></script>
<script type="text/babel" src="beaver-variants.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function NotFoundPage() {
    return (
      <div className="bv">
        <BvHeader activeTab="research" />
        <div className="nf-wrap">

          <div className="nf-photo">
            <img src="images/jaeger.jpg" alt="Long-tailed Jaeger on a spruce top" />
          </div>

          <div className="nf-tag">404 · Under construction</div>
          <h1 className="nf-head">This page is still migrating.</h1>
          <p className="nf-body">Check back later.</p>

          <div className="nf-back">
            <a id="nf-back-link" href="index.html">← Back to research</a>
          </div>

        </div>
      </div>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<NotFoundPage />);

  // Make the back link contingent on referrer — if they came from another
  // page on this site, send them back there; otherwise fall back to research.
  setTimeout(() => {
    try {
      const link = document.getElementById('nf-back-link');
      const ref = document.referrer;
      if (link && ref) {
        const refUrl = new URL(ref);
        const here = new URL(window.location.href);
        if (refUrl.origin === here.origin && refUrl.pathname !== here.pathname) {
          link.href = ref;
          link.textContent = '← Back to where you were';
        }
      }
    } catch (e) { /* keep default */ }
  }, 0);
</script>
</body>
